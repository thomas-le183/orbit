<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>App Shell Mockup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; }

  .label { text-align: center; font-size: 11px; color: #555; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; font-family: monospace; }

  /* Shell */
  .shell {
    background: #0d0d0d;
    border: 1px solid #1f1f1f;
    border-radius: 10px;
    overflow: hidden;
    max-width: 960px;
    margin: 0 auto 32px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    height: 520px;
    display: flex;
    flex-direction: column;
  }

  /* Top nav */
  .top-nav {
    height: 44px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    flex-shrink: 0;
    background: #0d0d0d;
  }
  .workspace-btn {
    font-size: 12px;
    font-weight: 600;
    color: #e8e8e8;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .workspace-btn svg { color: #555; }
  .search-bar {
    flex: 1;
    max-width: 340px;
    height: 28px;
    border: 1px solid #1f1f1f;
    border-radius: 5px;
    background: #111;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 6px;
    margin: 0 auto;
    color: #444;
    font-size: 11px;
  }
  .user-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: #3b82f6;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: white;
    margin-left: auto;
  }

  /* Body */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Icon rail */
  .rail {
    width: 52px;
    border-right: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 2px;
    flex-shrink: 0;
    background: #0a0a0a;
  }
  .rail-item {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #444;
    transition: background .15s, color .15s;
    position: relative;
  }
  .rail-item:hover { background: #161616; color: #888; }
  .rail-item.active { background: #0f1d35; color: #3b82f6; }
  .rail-item svg { width: 16px; height: 16px; }
  .rail-spacer { flex: 1; }
  .rail-bottom {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    cursor: pointer;
  }
  .rail-bottom:hover { color: #666; }

  /* Tooltip */
  .rail-item[data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    left: calc(100% + 10px);
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #e8e8e8;
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s;
    z-index: 99;
  }
  .rail-item[data-tip]:hover::after { opacity: 1; }

  /* Contextual sidebar */
  .sidebar {
    width: 220px;
    border-right: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    background: #0a0a0a;
    overflow: hidden;
  }
  .sidebar-header {
    height: 44px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    border-bottom: 1px solid #141414;
    gap: 6px;
    flex-shrink: 0;
  }
  .sidebar-title {
    font-size: 12px;
    font-weight: 600;
    color: #d0d0d0;
    letter-spacing: -0.2px;
  }
  .sidebar-icon { color: #3b82f6; }
  .sidebar-action {
    margin-left: auto;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    color: #444;
    cursor: pointer;
  }
  .sidebar-action:hover { background: #161616; color: #888; }

  .sidebar-section {
    padding: 10px 8px 4px;
  }
  .sidebar-section-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #333;
    font-family: monospace;
    padding: 0 6px;
    margin-bottom: 3px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 8px;
    border-radius: 5px;
    font-size: 11px;
    color: #555;
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .sidebar-item:hover { background: #141414; color: #888; }
  .sidebar-item.active { background: #0f1d35; color: #e8e8e8; }
  .sidebar-item svg { width: 13px; height: 13px; flex-shrink: 0; }
  .sidebar-item .unread {
    margin-left: auto;
    font-size: 9px;
    background: #3b82f6;
    color: white;
    border-radius: 10px;
    padding: 1px 5px;
    font-weight: 600;
  }
  .sidebar-item .dot {
    margin-left: auto;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
  }

  /* Content */
  .content {
    flex: 1;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }
  .content-placeholder {
    font-size: 13px;
    color: #2a2a2a;
    font-family: monospace;
  }

  /* Tab switcher below */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 11px;
    border: 1px solid #222;
    background: #111;
    color: #555;
    cursor: pointer;
    transition: all .15s;
    font-family: monospace;
    letter-spacing: 0.3px;
  }
  .tab-btn:hover { border-color: #333; color: #888; }
  .tab-btn.active { border-color: #1e3a5f; background: #0f1d35; color: #3b82f6; }

  .note { text-align: center; font-size: 10px; color: #333; font-family: monospace; margin-top: 6px; }
</style>
</head>
<body>

<div class="label">↓ click tabs below to switch between module sidebar states ↓</div>

<div class="shell">
  <!-- Top Nav -->
  <div class="top-nav">
    <div class="workspace-btn">
      Acme Corp

    </div>
    <div class="search-bar">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5" cy="5" r="3.5"/><path d="M8 8l2.5 2.5"/></svg>
      Search...
    </div>
    <div class="user-avatar">TL</div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Icon Rail -->
    <div class="rail" id="rail">
      <div class="rail-item active" data-tip="Chat" data-module="chat" onclick="switchModule('chat')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1h14v10H9l-4 4v-4H1z"/></svg>
      </div>
      <div class="rail-item" data-tip="Tasks" data-module="tasks" onclick="switchModule('tasks')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><path d="M5 8l2.5 2.5L11 5"/></svg>
      </div>
      <div class="rail-item" data-tip="Time" data-module="time" onclick="switchModule('time')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 2"/></svg>
      </div>
      <div class="rail-item" data-tip="AI Chat" data-module="ai" onclick="switchModule('ai')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h6"/><circle cx="13" cy="11" r="2.5"/><path d="M13 8.5v-1"/></svg>
      </div>
      <div class="rail-spacer"></div>
      <div class="rail-bottom" data-tip="Settings" onclick="switchModule('settings')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
      </div>
    </div>

    <!-- Contextual Sidebar -->
    <div class="sidebar" id="sidebar">
      <!-- filled by JS -->
    </div>

    <!-- Content area -->
    <div class="content">
      <div class="content-placeholder" id="content-label">// chat · #general</div>
    </div>

  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchModule('chat')">💬 Chat</button>
  <button class="tab-btn" onclick="switchModule('tasks')">✓ Tasks</button>
  <button class="tab-btn" onclick="switchModule('time')">⏱ Time</button>
  <button class="tab-btn" onclick="switchModule('ai')">✦ AI Chat</button>
</div>
<div class="note">// each module has its own sidebar — click to see how it changes</div>

  time: {

        <div class="sidebar-item">
          <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="11" height="10" rx="1.5"/><path d="M1 5h11M4 1v2M9 1v2"/></svg>

function switchModule(name) {
  const mod = modules[name];
  if (!mod) return;

  // Update rail
  document.querySelectorAll('.rail-item').forEach(el => {
    el.classList.toggle('active', el.dataset.module === name);
  });

  // Update sidebar
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `
    <div class="sidebar-header">
      <span class="sidebar-icon">${mod.icon.replace('stroke-width="1.5"', 'width="14" height="14" stroke-width="1.5"')}</span>
      <span class="sidebar-title">${mod.title}</span>
      <div class="sidebar-action">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6.5 1v11M1 6.5h11"/></svg>
      </div>
    </div>
    ${mod.content}
  `;

  // Update content label
  document.getElementById('content-label').textContent = mod.label;

  // Update tabs
  document.querySelectorAll('.tab-btn').forEach(el => {
    el.classList.toggle('active', el.textContent.toLowerCase().includes(name === 'ai' ? 'ai' : name));
  });
}

// Init

</script>
</body>
</html>
